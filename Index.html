<!DOCTYPE html>
<html lang="en">
<head>
  Dazzel Soap Dish
  
  <meta charset="UTF-8">
  <title>3D Model + AR View</title>

  <!-- Model Viewer (Google) -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #274d3e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    model-viewer {
      width: 90%;
      height: 90%;
    }
  </style>
</head>
<body>

 
   <model-viewer
  src="Soap-Dish.glb"
  ios-src="Soap-Dish.usdz"
  ar
  ar-modes="scene-viewer webxr quick-look"
  camera-controls
  auto-rotate>
      
    <button slot="ar-button" style="
      background: white;
      border-radius: 8px;
      border: none;
      padding: 20px 32px;
      position: fixed;
      top: 40px;
      centre: 40px;
      z-index: 999;
      top: 50px;
      centre: 40px;
      font-size: 24px;
      cursor: pointer;">
      View in your space 🚀
    </button>

  </model-viewer>

</body>
</html>
