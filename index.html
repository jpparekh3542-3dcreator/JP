<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirror Cabinet Viewer</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    model-viewer {
      width: 100%;
      height: 100vh;
      background: #ffffff;
    }

    .controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10; 
      display: flex;
      gap: 10px;
    }

    button {
      padding: 12px 20px;
      border: none;
      background: #000;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      border-radius: 6px;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #444;
    }
  </style>
</head>
<body>

  <model-viewer
    id="cabinet"
    src="02 Mirror Cabinet.glb"
    ios-src="02 Mirror Cabinet.usdz"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    interaction-prompt="none">

    <button slot="ar-button" style="
      background: black;
      color: white;
      border-radius: 6px;
      padding: 10px 16px;
      border: none;
      position: absolute;
      bottom: 80px; 
      left: 50%;
      transform: translateX(-50%);">
      View in AR
    </button>

  </model-viewer>

  <div class="controls">
    <button id="open-btn">Open Door</button>
    <button id="close-btn">Close Door</button>
  </div>

  <script>
    const viewer = document.getElementById("cabinet");
    const openBtn = document.getElementById("open-btn");
    const closeBtn = document.getElementById("close-btn");

    // OPEN DOOR
    openBtn.addEventListener("click", () => {
      viewer.timeScale = 1; // Play forward
      viewer.play({ repetitions: 1 }); // Force it to play exactly ONCE and stop
    });

    // CLOSE DOOR
    closeBtn.addEventListener("click", () => {
      viewer.timeScale = -1; // Play backward
      viewer.play({ repetitions: 1 }); // Force it to play exactly ONCE in reverse and stop
    });
  </script>
  
</body>
</html>
