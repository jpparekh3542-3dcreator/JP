<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mirror Cabinet Viewer</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body{
  margin:0;
  background:#f5f5f5;
  font-family:Arial, sans-serif;
}

model-viewer{
  width:100%;
  height:100vh;
  background:#ffffff;
}

.controls{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
}

button{
  padding:12px 20px;
  margin:5px;
  border:none;
  background:#000;
  color:#fff;
  cursor:pointer;
  font-size:14px;
  border-radius:6px;
}

button:hover{
  background:#444;
}
</style>
</head>

<body>

<model-viewer
  id="cabinet"
  src="02 Mirror Cabinet.glb"
  ios-src="02 Mirror Cabinet.usdz"
  ar
  ar-modes="webxr scene-viewer quick-look"
  camera-controls
  shadow-intensity="1"
  exposure="1"
  environment-image="neutral"
  interaction-prompt="none"
  autoplay="false"
  animation-loop="once">

<!-- AR Button -->
<button slot="ar-button" style="
  background:black;
  color:white;
  border-radius:6px;
  padding:6px 10px;
  border:none;">
  View in AR
</button>

</model-viewer>

<div class="controls">
  <button onclick="openDoor()">Open Door</button>
  <button onclick="closeDoor()">Close Door</button>
</div>

<script>
const viewer = document.getElementById("cabinet");

let duration = 0;

viewer.addEventListener("load", () => {
  viewer.pause();
  viewer.currentTime = 0;
  duration = viewer.duration; // duration of 0-50 frames
});

function openDoor(){
  viewer.pause();
  viewer.currentTime = 0;
  viewer.play();

  setTimeout(() => {
    viewer.pause();
    viewer.currentTime = duration;
  }, duration * 1000);
}

function closeDoor(){
  viewer.pause();
  viewer.currentTime = duration;
  viewer.play({direction:"reverse"});

  setTimeout(() => {
    viewer.pause();
    viewer.currentTime = 0;
  }, duration * 1000);
}
</script>
  
</body>
</html>
