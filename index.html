<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mirror Cabinet Viewer</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {
  margin:0;
  background:#f5f5f5;
  font-family:Arial, sans-serif;
}

model-viewer {
  width:100%;
  height:100vh;
  background:#ffffff;
}

.controls {
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
}

button {
  padding:12px 20px;
  margin:5px;
  border:none;
  background:#000;
  color:#fff;
  cursor:pointer;
  font-size:14px;
  border-radius:6px;
}

button:hover {
  background:#444;
}
</style>
</head>

<body>

<model-viewer 
  id="cabinet"
  src="02 Mirror Cabinet.glb"
  ios-src="02 Mirror Cabinet.usdz"
  ar
  ar-modes="webxr scene-viewer quick-look"
  camera-controls
  shadow-intensity="1"
  exposure="1"
  environment-image="neutral"
  animation-name="*"
  interaction-prompt="none">
</model-viewer>

<div class="controls">
  <button onclick="openDoor()">Open Door</button>
  <button onclick="closeDoor()">Close Door</button>
</div>

<script>
const viewer = document.getElementById("cabinet");

viewer.addEventListener("load", () => {
  viewer.pause();
  viewer.currentTime = 50;
});

function openDoor() {
  viewer.currentTime = 0;
  viewer.play();

  viewer.addEventListener('finished', stopAtEnd, { once: true });
}

function stopAtEnd() {
  viewer.pause();
  viewer.currentTime = viewer.duration;
}

function closeDoor() {
  viewer.currentTime = viewer.duration;
  viewer.play({ direction: "reverse" });

  viewer.addEventListener('finished', stopAtStart, { once: true });
}

function stopAtStart() {
  viewer.pause();
  viewer.currentTime = 0;
}
</script>

</body>
</html>
